<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>热点随身听 Pulse</title>
  
  
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0D0D0D;
      --bg-card: #1A1A1A;
      --bg-elevated: #242424;
      --accent-primary: #E8A445;
      --accent-warm: #D4622A;
      --accent-cool: #5B8A72;
      --accent-purple: #8B6FBD;
      --accent-blue: #4A7FBF;
      --text-primary: #F5F0E8;
      --text-secondary: #9A9488;
      --text-muted: #5C5750;
      --border: #2E2E2E;
      --glow: rgba(232, 164, 69, 0.15);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg-primary); color: var(--text-primary); font-family: 'LXGW WenKai', 'Noto Serif SC', system-ui, sans-serif; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; user-select: none; }
    ::-webkit-scrollbar { width: 0; }

    #app { max-width: 430px; height: 100%; margin: 0 auto; display: flex; flex-direction: column; position: relative; overflow: hidden; background: var(--bg-primary); }

    /* ── Activation Screen ── */
    #activation-screen { position: fixed; inset: 0; z-index: 1000; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; }
    #activation-screen.hide { display: none; }

    .activation-logo { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm)); display: flex; align-items: center; justify-content: center; font-family: 'Ma Shan Zheng', cursive; font-size: 40px; color: #fff; margin-bottom: 24px; box-shadow: 0 0 60px var(--glow), 0 0 120px var(--glow); animation: pulse-glow 3s ease-in-out infinite; position: relative; }
    .activation-logo::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 1.5px solid rgba(232,164,69,0.3); animation: ripple-ring 2s ease-out infinite; }
    @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 40px var(--glow), 0 0 80px var(--glow); } 50% { box-shadow: 0 0 60px rgba(232,164,69,0.3), 0 0 120px var(--glow); } }
    @keyframes ripple-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

    .activation-title { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; letter-spacing: 0.05em; }
    .activation-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 40px; text-align: center; line-height: 1.8; }
    .activation-input-wrap { width: 100%; max-width: 280px; position: relative; margin-bottom: 16px; }
    .activation-input { width: 100%; padding: 14px 20px; background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 14px; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 15px; letter-spacing: 0.1em; text-align: center; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .activation-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--glow); }
    .activation-input::placeholder { color: var(--text-muted); text-transform: none; letter-spacing: 0; }
    .activation-btn { width: 100%; max-width: 280px; padding: 14px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm)); border: none; border-radius: 14px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.15s; margin-bottom: 12px; }
    .activation-btn:active { transform: scale(0.97); opacity: 0.85; }
    .activation-hint { font-size: 12px; color: var(--text-muted); text-align: center; }
    .activation-error { font-size: 13px; color: var(--accent-warm); margin-bottom: 12px; min-height: 20px; }

    /* ── Header ── */
    #header { padding: calc(var(--safe-top) + 12px) 20px 12px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--bg-primary); position: relative; z-index: 10; }
    .header-logo { display: flex; align-items: center; gap: 10px; }
    .header-logo-icon { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm)); display: flex; align-items: center; justify-content: center; font-family: 'Ma Shan Zheng', cursive; font-size: 20px; color: #fff; }
    .header-logo-text { font-family: 'Ma Shan Zheng', cursive; font-size: 22px; color: var(--text-primary); }
    .header-actions { display: flex; gap: 8px; }
    .header-icon-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--bg-card); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: background 0.2s, color 0.2s; }
    .header-icon-btn:active { background: var(--bg-elevated); }

    /* ── Main Scroll ── */
    #main-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0 20px 100px; }

    /* ── Sections ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; margin-top: 28px; }
    .section-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
    .section-title .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-warm); animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .section-more { font-size: 12px; color: var(--accent-primary); cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 20px; transition: background 0.2s; }
    .section-more:hover { background: var(--glow); }

    .update-bar { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); background: var(--bg-card); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); margin-top: 12px; }
    .update-bar .pulse-line { display: flex; gap: 2px; align-items: flex-end; height: 12px; }
    .update-bar .bar { width: 2px; border-radius: 1px; background: var(--accent-primary); animation: wave-bar 1s ease-in-out infinite; }
    .update-bar .bar:nth-child(1) { height: 4px; animation-delay: 0s; }
    .update-bar .bar:nth-child(2) { height: 8px; animation-delay: 0.1s; }
    .update-bar .bar:nth-child(3) { height: 12px; animation-delay: 0.2s; }
    @keyframes wave-bar { 0%,100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }

    /* ── Hero Card ── */
    .hero-card { border-radius: 20px; overflow: hidden; position: relative; cursor: pointer; margin-bottom: 8px; background: var(--bg-card); transition: transform 0.2s; animation: fadeInUp 0.5s ease-out both; }
    .hero-card:active { transform: scale(0.98); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .hero-card img { width: 100%; height: 200px; object-fit: cover; display: block; }
    .hero-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 80px 20px 20px; background: linear-gradient(to top, rgba(13,13,13,0.95) 0%, transparent 100%); }
    .hero-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; }
    .hero-title { font-family: 'Noto Serif SC', serif; font-size: 19px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .hero-meta { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-secondary); }
    .hero-play-btn { position: absolute; top: 16px; right: 16px; width: 44px; height: 44px; border-radius: 50%; background: var(--accent-primary); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; box-shadow: 0 4px 20px rgba(232,164,69,0.4); transition: transform 0.2s; }
    .hero-play-btn:active { transform: scale(0.9); }

    /* ── News Cards ── */
    .news-list { display: flex; flex-direction: column; gap: 12px; }
    .news-card { background: var(--bg-card); border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.15s; animation: fadeInUp 0.5s ease-out both; }
    .news-card:active { transform: scale(0.98); }
    .news-card-inner { display: flex; gap: 12px; padding: 14px; }
    .news-card-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
    .news-card-content { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
    .news-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .news-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; display: inline-flex; align-items: center; gap: 3px; }
    .news-bookmark { color: var(--text-muted); font-size: 16px; transition: color 0.2s; flex-shrink: 0; cursor: pointer; }
    .news-bookmark.active { color: var(--accent-primary); }
    .news-card-title { font-family: 'Noto Serif SC', serif; font-size: 14px; font-weight: 600; line-height: 1.5; color: var(--text-primary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin: 4px 0; }
    .news-card-bottom { display: flex; align-items: center; justify-content: space-between; }
    .news-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
    .news-play-btn-small { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-primary); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; transition: transform 0.15s; flex-shrink: 0; }
    .news-play-btn-small:active { transform: scale(0.9); }
    .news-play-btn-small.playing { background: var(--bg-elevated); color: var(--accent-primary); }

    /* ── Channels ── */
    .channels-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .channel-card { background: var(--bg-card); border-radius: 16px; padding: 16px; cursor: pointer; transition: transform 0.15s; animation: fadeInUp 0.5s ease-out both; position: relative; overflow: hidden; }
    .channel-card:active { transform: scale(0.97); }
    .channel-card::before { content: ''; position: absolute; top: 0; right: 0; width: 60px; height: 60px; border-radius: 0 16px 0 60px; opacity: 0.12; }
    .channel-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 10px; color: #fff; }
    .channel-name { font-family: 'Noto Serif SC', serif; font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .channel-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .channel-badge { display: inline-flex; align-items: center; gap: 4px; font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 2px 8px; border-radius: 20px; }

    /* ── Mini Player ── */
    #mini-player { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); max-width: 430px; width: calc(100% - 40px); background: rgba(36,36,36,0.95); border: 1px solid var(--border); border-radius: 16px; padding: 10px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; z-index: 50; box-shadow: 0 -4px 30px rgba(0,0,0,0.4); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s; backdrop-filter: blur(20px); }
    #mini-player.hidden { transform: translateX(-50%) translateY(120px); opacity: 0; pointer-events: none; }
    .mini-cover { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
    .mini-cover.spinning { animation: spin-cover 8s linear infinite; }
    @keyframes spin-cover { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .mini-info { flex: 1; min-width: 0; }
    .mini-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .mini-channel { font-size: 11px; color: var(--text-secondary); }
    .mini-progress-bar { height: 3px; border-radius: 2px; margin-top: 6px; background: var(--border); overflow: hidden; }
    .mini-progress-fill { height: 100%; background: var(--accent-primary); border-radius: 2px; transition: width 0.5s linear; }
    .mini-controls { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .mini-btn { width: 36px; height: 36px; border-radius: 50%; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-primary); font-size: 18px; transition: background 0.15s; }
    .mini-btn:active { background: var(--bg-card); }
    .mini-btn.primary { background: var(--accent-primary); color: #fff; width: 40px; height: 40px; font-size: 20px; }

    /* ── Bottom Nav ── */
    #bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); max-width: 430px; width: 100%; display: flex; background: rgba(13,13,13,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 8px 0 calc(var(--safe-bottom) + 4px); z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 6px 0; cursor: pointer; color: var(--text-muted); transition: color 0.2s; border: none; background: none; position: relative; }
    .nav-item.active { color: var(--accent-primary); }
    .nav-item .nav-icon { font-size: 22px; }
    .nav-item .nav-label { font-size: 10px; }
    .nav-item.active::before { content: ''; position: absolute; top: -8px; width: 20px; height: 2px; border-radius: 2px; background: var(--accent-primary); }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .page-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 20px 100px; }

    /* ── Player Page ── */
    #player-page { position: fixed; inset: 0; z-index: 200; background: var(--bg-primary); display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32,0.72,0,1); }
    #player-page.open { transform: translateY(0); }
    .player-drag-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: calc(var(--safe-top) + 12px) auto 16px; cursor: pointer; }
    .player-cover-wrap { display: flex; justify-content: center; padding: 10px 40px 0; }
    .player-cover { width: 240px; height: 240px; border-radius: 20px; object-fit: cover; box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px var(--glow); }
    .player-cover.playing { animation: cover-breathe 4s ease-in-out infinite; }
    @keyframes cover-breathe { 0%,100% { box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px var(--glow); } 50% { box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 80px rgba(232,164,69,0.2); } }
    .player-cover.playing.spinning { animation: cover-breathe 4s ease-in-out infinite, spin-cover 8s linear infinite; }
    .player-info { padding: 24px 32px 8px; text-align: center; }
    .player-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .player-channel-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 3px 12px; border-radius: 20px; margin-bottom: 16px; }
    .player-progress-wrap { padding: 0 32px; margin-bottom: 8px; }
    .player-progress-bar { height: 4px; border-radius: 2px; background: var(--border); position: relative; cursor: pointer; }
    .player-progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent-primary), var(--accent-warm)); position: relative; }
    .player-progress-fill::after { content: ''; position: absolute; right: -6px; top: -4px; width: 12px; height: 12px; border-radius: 50%; background: var(--accent-primary); box-shadow: 0 0 8px rgba(232,164,69,0.5); }
    .player-times { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 20px; }
    .player-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 8px; }
    .player-ctrl-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--bg-card); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-primary); font-size: 20px; transition: background 0.15s, transform 0.15s; }
    .player-ctrl-btn:active { transform: scale(0.9); }
    .player-ctrl-btn.play-main { width: 64px; height: 64px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm)); font-size: 26px; color: #fff; box-shadow: 0 8px 30px rgba(232,164,69,0.4); }
    .player-extras { display: flex; justify-content: center; gap: 12px; padding: 0 32px; margin-bottom: 16px; }
    .player-extra-btn { padding: 5px 14px; border-radius: 20px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.2s; }
    .player-extra-btn.active { background: var(--glow); border-color: var(--accent-primary); color: var(--accent-primary); }
    .player-transcript { margin: 0 20px 20px; padding: 16px; background: var(--bg-card); border-radius: 16px; max-height: 120px; overflow-y: auto; }
    .player-transcript-label { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .player-transcript-text { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }

    /* ── Tag Chips ── */
    .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .tag-chip { padding: 7px 14px; border-radius: 20px; background: var(--bg-card); border: 1.5px solid var(--border); color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .tag-chip.selected { background: var(--glow); border-color: var(--accent-primary); color: var(--accent-primary); }

    /* ── Profile ── */
    .profile-header { display: flex; align-items: center; gap: 16px; padding: 20px 0 24px; }
    .profile-avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm)); display: flex; align-items: center; justify-content: center; font-family: 'Ma Shan Zheng', cursive; font-size: 30px; color: #fff; }
    .profile-name { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .profile-stat-row { display: flex; gap: 24px; padding: 16px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .profile-stat { text-align: center; flex: 1; }
    .profile-stat-num { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent-primary); }
    .profile-stat-label { font-size: 12px; color: var(--text-muted); }
    .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .settings-item-left { display: flex; align-items: center; gap: 12px; }
    .settings-item-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-secondary); }
    .settings-item-label { font-size: 14px; }
    .settings-item-sub { font-size: 11px; color: var(--text-muted); }
    .toggle { width: 44px; height: 24px; border-radius: 12px; background: var(--border); position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
    .toggle.on { background: var(--accent-primary); }
    .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: transform 0.2s; }
    .toggle.on::after { transform: translateX(20px); }

    /* ── Toast ── */
    #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.8); background: var(--bg-elevated); border: 1px solid var(--border); padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); color: var(--text-primary); box-shadow: 0 10px 40px rgba(0,0,0,0.5); white-space: nowrap; }
    #toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

    /* Stagger */
    .news-card:nth-child(1) { animation-delay: 0.05s; }
    .news-card:nth-child(2) { animation-delay: 0.12s; }
    .news-card:nth-child(3) { animation-delay: 0.19s; }
    .news-card:nth-child(4) { animation-delay: 0.26s; }
    .news-card:nth-child(5) { animation-delay: 0.33s; }
    .channel-card:nth-child(1) { animation-delay: 0.05s; }
    .channel-card:nth-child(2) { animation-delay: 0.10s; }
    .channel-card:nth-child(3) { animation-delay: 0.15s; }
    .channel-card:nth-child(4) { animation-delay: 0.20s; }
    .channel-card:nth-child(5) { animation-delay: 0.25s; }
  </style>
</head>
<body>
<div id="app">

  <!-- Activation Screen -->
  <div id="activation-screen">
    <div class="activation-logo">P</div>
    <div class="activation-title">热点随身听</div>
    <div class="activation-subtitle">专为碎片时间打造的声音资讯伴侣<br>把天下大事，变成你的专属电台</div>
    <div class="activation-input-wrap">
      <input class="activation-input" id="activation-code" type="text" placeholder="输入内测码" maxlength="20" autocomplete="off" spellcheck="false">
    </div>
    <div class="activation-error" id="activation-error"></div>
    <button class="activation-btn" id="activation-btn">激活内测资格</button>
    <div class="activation-hint">内测码：PULSE-2026-ALPHA</div>
  </div>

  <!-- Header -->
  <div id="header">
    <div class="header-logo">

function init() {
  const saved = localStorage.getItem('pulse_state');
  if (saved) {
    try { state = { ...state, ...JSON.parse(saved) }; } catch(e) {}
  }
  if (state.activated) {
    document.getElementById('activation-screen').classList.add('hide');
  }
  render();
}

function saveState() {
  localStorage.setItem('pulse_state', JSON.stringify(state));
}

// ─────────────────────────────────────

document.getElementById('activation-btn').addEventListener('click', activate);
document.getElementById('activation-code').addEventListener('keydown', e => {
  if (e.key === 'Enter') activate();
});

function activate() {
  const code = document.getElementById('activation-code').value.trim().toUpperCase();
  if (code === 'PULSE-2026-ALPHA') {
    state.activated = true;
    saveState();
    document.getElementById('activation-screen').classList.add('hide');
    showToast('内测资格激活成功！');
    render();
  } else {
    document.getElementById('activation-error').textContent = '内测码无效，请检查后重新输入';
    document.getElementById('activation-code').classList.add('shake');
    setTimeout(() => document.getElementById('activation-code').classList.remove('shake'), 500);
  }
}

  renderPage(page);
}

function playNews(id) {
  const idx = NEWS.findIndex(n => n.id === id);
  if (idx < 0) return;
  state.currentTrackIndex = idx;
  state.isPlaying = true;
  state.progress = 0;
  if (!state.history.includes(id)) {
    state.history.push(id);
    if (state.history.length > 50) state.history.shift();
  }
  saveState();
  updateMiniPlayer();
  updatePlayerUI();
  document.getElementById('mini-player').classList.remove('hidden');
  // Simulate progress
  if (window._pulseTimer) clearInterval(window._pulseTimer);
  window._pulseTimer = setInterval(() => {
    if (!state.isPlaying) return;
    const track = NEWS[state.currentTrackIndex];
    if (!track) return;
    const step = (state.speed * 100) / track.duration;
    state.progress = Math.min(100, state.progress + step);
    if (state.progress >= 100) {
      nextTrack();
    }
    updateMiniPlayer();
    updatePlayerUI();
  }, 100);
}

function togglePlay() {
  state.isPlaying = !state.isPlaying;
  updateMiniPlayer();
  updatePlayerUI();
}

function prevTrack() {
  if (state.currentTrackIndex > 0) {
    playNews(NEWS[state.currentTrackIndex - 1].id);
  }
}

function nextTrack() {
  if (state.currentTrackIndex < NEWS.length - 1) {
    playNews(NEWS[state.currentTrackIndex + 1].id);
  } else {
    state.isPlaying = false;
    state.progress = 0;
    updateMiniPlayer();
    updatePlayerUI();
  }
}

function seekRelative(secs) {
  // simulate seeking - in real app this would be audio.currentTime
  const track = NEWS[state.currentTrackIndex];
  if (!track) return;
  state.progress = Math.max(0, Math.min(100, state.progress + (secs / track.duration) * 100));
  updateMiniPlayer();
  updatePlayerUI();
}

function openPlayer() {
  document.getElementById('player-page').classList.add('open');
  updatePlayerUI();
}

function closePlayer() {
  document.getElementById('player-page').classList.remove('open');
}

function updateMiniPlayer() {
  const track = NEWS[state.currentTrackIndex];
  if (!track) return;
  const mini = document.getElementById('mini-player');
  const cover = document.getElementById('mini-cover');
  const title = document.getElementById('mini-title');
  const channel = document.getElementById('mini-channel');
  const progress = document.getElementById('mini-progress');
  const playBtn = document.getElementById('mini-play-btn');

  cover.src = track.img;
  title.textContent = track.title;
  const ch = CHANNELS.find(c => c.id === track.channel);
  channel.textContent = ch ? ch.name : '';
  progress.style.width = state.progress + '%';
  playBtn.innerHTML = state.isPlaying ? '<i class="ph ph-pause"></i>' : '<i class="ph ph-play"></i>';
  cover.classList.toggle('spinning', state.isPlaying);
}

function updatePlayerUI() {
  const track = NEWS[state.currentTrackIndex];
  if (!track) return;
  const ch = CHANNELS.find(c => c.id === track.channel);
  document.getElementById('player-cover').src = track.img;
  document.getElementById('player-cover').className = 'player-cover' + (state.isPlaying ? ' playing spinning' : '');
  document.getElementById('player-title').textContent = track.title;
  const tag = document.getElementById('player-channel-tag');
  tag.innerHTML = `<i class="ph ${ch.icon}"></i>${ch.name}`;
  tag.style.background = ch.bg;
  tag.style.color = ch.color;
  document.getElementById('player-progress-fill').style.width = state.progress + '%';
  document.getElementById('player-cur-time').textContent = fmtDuration(Math.floor((state.progress / 100) * track.duration));
  document.getElementById('player-total-time').textContent = fmtDuration(track.duration);

  const playMainBtn = document.querySelector('.play-main');
  if (playMainBtn) playMainBtn.innerHTML = state.isPlaying ? '<i class="ph ph-pause-fill"></i>' : '<i class="ph ph-play-fill"></i>';

  document.getElementById('mini-play-btn').innerHTML = state.isPlaying ? '<i class="ph ph-pause"></i>' : '<i class="ph ph-play"></i>';
}

// ─────────────────────────────────────
//  Interactions
// ─────────────────────────────────────
function toggleBookmark(id) {
  const idx = state.bookmarks.indexOf(id);
  if (idx < 0) {
    state.bookmarks.push(id);
    showToast('已添加收藏');
  } else {
    state.bookmarks.splice(idx, 1);
    showToast('已取消收藏');
  }
  state.totalBookmarks = state.bookmarks.length;
  saveState();
  render();
}

function toggleSubscribe(id) {
  const idx = state.subscriptions.indexOf(id);
  if (idx < 0) {
    state.subscriptions.push(id);
    const ch = CHANNELS.find(c => c.id === id);
    showToast(`已订阅「${ch.name}」`);
  } else {
    if (state.subscriptions.length <= 1) { showToast('至少保留一个订阅'); return; }
    state.subscriptions.splice(idx, 1);
    const ch = CHANNELS.find(c => c.id === id);
    showToast(`已取消订阅「${ch.name}」`);
  }
  saveState();
  render();
}

function toggleInterest(tag) {
  const idx = state.interests.indexOf(tag);
  if (idx < 0) {
    state.interests.push(tag);
  } else {
    state.interests.splice(idx, 1);
  }
  saveState();
  render();
}

function clearHistory() {
  state.history = [];
  state.totalListens = 0;
  saveState();
  showToast('播放历史已清除');
  render();
}

// ─────────────────────────────────────
//  Utilities
// ─────────────────────────────────────
function fmtDuration(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return `${mins}分钟前`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}小时前`;
  return `${Math.floor(hrs/24)}天前`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function cycleSpeed() {
  const speeds = [1, 1.25, 1.5, 0.75];
  const labels = ['1x', '1.25x', '1.5x', '0.75x'];
  const currentIdx = speeds.indexOf(state.speed);
  const nextIdx = (currentIdx + 1) % speeds.length;
  state.speed = speeds[nextIdx];
  const btn = document.getElementById('speed-btn');
  document.getElementById('speed-label').textContent = labels[nextIdx];
  btn.classList.toggle('active', state.speed !== 1);
  saveState();
}

function setSleepTimer() {
  const options = [0, 15, 30, 60];
  const labels = ['关闭', '15分钟', '30分钟', '60分钟'];
  const currentIdx = options.indexOf(state.sleepTimerMinutes);
  const nextIdx = (currentIdx + 1) % options.length;
  state.sleepTimerMinutes = options[nextIdx];
  document.getElementById('sleep-label').textContent = labels[nextIdx];
  const btn = document.getElementById('player-extras')?.children[1];
  if (state.sleepTimer) { clearTimeout(state.sleepTimer); state.sleepTimer = null; }
  if (state.sleepTimerMinutes > 0) {
    state.sleepTimer = setTimeout(() => {
      state.isPlaying = false;
      state.sleepTimerMinutes = 0;
      updateMiniPlayer();
      updatePlayerUI();
      showToast('定时关闭，播放已停止');
    }, state.sleepTimerMinutes * 60000);
    showToast(`${state.sleepTimerMinutes}分钟后自动停止`);
  }
  const sleepBtn = document.querySelector('.player-extras')?.children[1];
  if (sleepBtn) sleepBtn.classList.toggle('active', state.sleepTimerMinutes > 0);
  saveState();
}

function toggleTranscript() {
  const el = document.getElementById('player-transcript');
  const track = NEWS[state.currentTrackIndex];
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  if (track) {
    document.getElementById('transcript-text').textContent = track.summary;
  }
}

// Progress bar seek + Start
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('player-progress-bar')?.addEventListener('click', e => {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    state.progress = Math.max(0, Math.min(100, pct * 100));
    updateMiniPlayer();
    updatePlayerUI();
  });
  init();
});
</script>
</body>
</html>
